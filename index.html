<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Varshamma</title>

<style>
body{
    background:#000;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    text-align:center;
    padding:20px;
}

.container{
    max-width:700px;
}

button{
    padding:12px 24px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

h1{
    margin-bottom:20px;
}

p{
    line-height:1.7;
}
</style>
</head>

<body>

<div class="container" id="content">

<h1>Hey Varshamma,</h1>

<p>
Before you close this page,
there's something I wanted to say properly.
</p>

<button onclick="question1()">
Unlock Message
</button>

</div>

<script>

function question1(){

document.getElementById("content").innerHTML = `

<h1>Question 1</h1>

<p>Why do you think I made this?</p>

<button onclick="wrong()">
Because I'm bored
</button>

<button onclick="question2()">
Because I'm feeling guilty
</button>

<button onclick="question2()">
Because I care
</button>

`;

}

function wrong(){
alert("Not quite 😅");
}

function question2(){

document.getElementById("content").innerHTML = `

<h1>Question 2</h1>

<p>What bothered me most after our fight?</p>

<button onclick="wrong()">
Losing the argument
</button>

<button onclick="wrong()">
Being right
</button>

<button onclick="reveal()">
Creating distance between us
</button>

`;

}

function reveal(){

document.getElementById("content").innerHTML = `

<h1>You unlocked the message.</h1>

<p>The truth is...</p>

<p style="font-size:28px;">
You still matter to me.
</p>

<p>
We've shared 2 years of memories.
</p>

<p>
Even after everything,
I don't like seeing us hurt each other.
</p>

<p>
I'm sorry for irritating you.
</p>

<p>
I'm sorry for the things I handled badly.
</p>

<p>
I know a website can't magically fix things.
</p>

<p>
I just wanted to say it properly instead of sending another text.
</p>

<p>
I'm not asking you to forget everything.
</p>

<p>
I'd just be happy if we could be on good terms again.
</p>

<p>
Thank you for reading.
</p>

<p>
— Yours truly
</p>

`;

}

</script>

</body>
</html>
