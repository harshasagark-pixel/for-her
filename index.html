</div>

<script>

function question1(){
document.getElementById("content").innerHTML=`
<h1>Question 1</h1>

<button onclick="q2()">Because I care</button>
`;
}

function wrong(){
alert("Not quite 😅");
}

function q2(){
document.getElementById("content").innerHTML=`
<h1>Question 2</h1>

<p>What bothered me most after our fight?</p>

<button onclick="wrong()">Losing the argument</button>

<button onclick="wrong()">Looking stupid</button>

<button onclick="reveal()">Creating distance between us</button>
`;
}

function reveal(){
document.getElementById("content").innerHTML=`
<h1>You unlocked the message.</h1>

<p>The truth is...</p>

<p style="font-size:28px;">

</p>

<p>

</p>

<p>

</p>

<p>

</p>

<p>

</p>

<p>

<p>

</p>

<p>

</p>

<p>

</p>

<p>

<br>
